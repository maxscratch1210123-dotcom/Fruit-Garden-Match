<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fruit Garden Match</title>
<style>
:root {
    --bg: #1a1a24;
    --panel: #1e1e2e;
    --red: #c0392b;
    --red-light: #e74c3c;
    --gold: #f1c40f;
    --green: #2ecc71;
    --purple: #8b5cf6;
    --text: #eee;
    --text-secondary: #aaa;
    --cell-bg: #1a1a2e;
    --board-bg: #0f3460;
}
*{box-sizing:border-box;user-select:none;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);display:flex;justify-content:center;align-items:center;font-family:sans-serif;overflow:hidden;touch-action:manipulation}
.container{background:var(--panel);padding:10px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.7);width:100%;max-width:520px;max-height:98vh;overflow:hidden;display:flex;flex-direction:column;gap:8px}

/* Верхняя панель */
.top-bar{background:var(--red);border-radius:15px;padding:10px 15px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.avatar{width:36px;height:36px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.currencies{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.currency-item{display:flex;align-items:center;gap:4px;color:var(--text);font-size:14px;font-weight:700;background:rgba(0,0,0,0.3);padding:4px 10px;border-radius:20px}
.currency-item span{color:var(--gold)}
.energy-bar-wrap{flex:1;min-width:80px;height:20px;background:rgba(0,0,0,0.5);border-radius:10px;overflow:hidden;position:relative}
.energy-bar-fill{height:100%;background:linear-gradient(90deg,#f39c12,#f1c40f);border-radius:10px;transition:width 0.3s}
.energy-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;color:#fff;font-weight:700;text-shadow:0 0 3px #000}

/* Контент */
.main-content{flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.menu-screen{display:flex;flex-direction:column;align-items:center;gap:12px;padding:15px 10px}
.menu-screen h1{color:var(--gold);font-size:24px;text-align:center}
.menu-screen .subtitle{color:var(--text-secondary);font-size:13px;text-align:center}
.play-btn{background:var(--gold);border:none;color:#1a1a2e;padding:15px 50px;border-radius:40px;font-size:22px;font-weight:700;cursor:pointer;transition:.2s;touch-action:manipulation;box-shadow:0 4px 15px rgba(241,196,15,0.4)}
.play-btn:hover{transform:scale(1.05)}
.play-btn:active{transform:scale(0.95)}

.daily-offer{background:var(--red);border-radius:15px;padding:12px;text-align:center;color:var(--text);margin-top:5px}
.daily-offer h3{font-size:14px;margin-bottom:6px}
.daily-offer p{font-size:13px;margin-bottom:8px;color:var(--text-secondary)}
.daily-offer button{background:var(--gold);border:none;color:#1a1a2e;padding:8px 20px;border-radius:20px;font-weight:700;cursor:pointer;font-size:14px;transition:.2s}
.daily-offer button:disabled{background:#555;color:#888;cursor:not-allowed}
.daily-offer button:hover:not(:disabled){transform:scale(1.05)}
.daily-offer .claimed{color:var(--green);font-weight:700}

.energy-section{text-align:center;padding:5px 0}
.energy-section .progress-wrap{width:80%;height:18px;background:rgba(255,255,255,0.1);border-radius:9px;overflow:hidden;margin:8px auto;border:1px solid rgba(255,255,255,0.2)}
.energy-section .progress-fill{height:100%;background:linear-gradient(90deg,#3498db,#2ecc71);border-radius:9px;transition:width 0.5s}
.energy-section .energy-label{font-size:12px;color:var(--text-secondary)}

/* Игровой экран */
.game-screen{display:none;flex-direction:column;gap:6px;flex:1}
.game-header{display:flex;justify-content:space-between;align-items:center;color:var(--text);font-size:13px;font-weight:700;flex-wrap:wrap;gap:4px;background:var(--red);border-radius:12px;padding:8px 12px}
.game-header .level-info{font-size:13px}
.game-header .moves{background:rgba(0,0,0,0.3);padding:4px 10px;border-radius:15px;color:var(--gold)}
.game-header button{background:rgba(0,0,0,0.4);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:11px;cursor:pointer;transition:.2s}
.game-header button:hover{background:rgba(0,0,0,0.6)}
.abilities-bar{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.abilities-bar button{font-size:10px;padding:4px 8px;background:var(--purple);border:none;color:#fff;border-radius:12px;cursor:pointer;transition:.2s}
.abilities-bar button:hover{background:#7c3aed}
.abilities-bar .shop-in-game{background:var(--gold);color:#1a1a2e;font-weight:700}
.board{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;background:var(--board-bg);padding:5px;border-radius:10px;max-width:100%;aspect-ratio:1/1}
.cell{aspect-ratio:1/1;background:var(--cell-bg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;box-shadow:inset 0 -2px 0 rgba(0,0,0,0.4);transition:.08s;position:relative;touch-action:manipulation}
.cell.selected{outline:2px solid var(--gold);outline-offset:-2px;transform:scale(.92)}
.cell.bomb{background:radial-gradient(circle,#f39c12,#e74c3c);color:#fff;text-shadow:0 0 10px rgba(255,255,255,.5);cursor:pointer}
.cell.bomb:hover{transform:scale(1.1)}
.cell.vase{background:#8b5cf6;color:#fff;text-shadow:0 0 10px rgba(255,255,255,.3)}
.cell.fruit{background:#2ecc71;color:#fff;text-shadow:0 0 10px rgba(255,255,255,.3)}
.empty{background:#0a0a1a;box-shadow:none;cursor:default}
.cell.falling{animation:dropIn .25s ease-out}
.cell.matched{animation:matchPop .25s ease-out forwards}
.cell.exploding{animation:explode .35s ease-out forwards}
.cell.bomb-created{animation:bombCreate .35s ease-out forwards}
@keyframes dropIn{0%{transform:translateY(-60px) scale(.7);opacity:0}70%{transform:translateY(5px) scale(1.02);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}}
@keyframes matchPop{0%{transform:scale(1);opacity:1}50%{transform:scale(1.2) rotate(8deg);opacity:.8}100%{transform:scale(0);opacity:0}}
@keyframes explode{0%{transform:scale(1);opacity:1;background:#f1c40f}50%{transform:scale(1.5);opacity:.8;background:#e74c3c}100%{transform:scale(0);opacity:0}}
@keyframes bombCreate{0%{transform:scale(0);opacity:0;background:#f1c40f}50%{transform:scale(1.3);opacity:.8;background:#e74c3c}100%{transform:scale(1);opacity:1;background:radial-gradient(circle,#f39c12,#e74c3c)}}

/* Нижнее меню */
.bottom-nav{background:var(--red);border-radius:15px;padding:8px 5px;display:flex;justify-content:space-around;align-items:center;gap:2px}
.nav-btn{background:transparent;border:none;color:#fff;font-size:11px;cursor:pointer;padding:6px 4px;border-radius:10px;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:2px;touch-action:manipulation;flex:1;text-align:center}
.nav-btn.active{background:rgba(255,255,255,0.2);font-weight:700}
.nav-btn:hover{background:rgba(255,255,255,0.1)}
.nav-btn .nav-icon{font-size:18px}

/* Модалки */
.metro-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.metro-content{background:#16213e;padding:20px;border-radius:20px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;color:#eee}
.metro-content h2{color:var(--gold);text-align:center;margin-bottom:15px}
.metro-content .station{background:#0f3460;padding:12px;border-radius:12px;margin-bottom:10px;display:flex;flex-direction:column;gap:4px}
.metro-content .station .header{display:flex;justify-content:space-between;font-weight:700}
.metro-content .station .bonus{font-size:13px;color:#a855f7}
.metro-content .station button{background:var(--gold);border:none;padding:6px 16px;border-radius:20px;font-weight:700;cursor:pointer;color:#1a1a2e;font-size:14px;margin-top:4px;transition:.2s}
.metro-content .station button:hover{transform:scale(1.05)}
.metro-content .station button:disabled{background:#555;color:#888;cursor:not-allowed;transform:none}
.metro-content .close-btn{background:var(--red-light);border:none;color:#fff;padding:10px 20px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:15px}
.metro-content .close-btn:hover{background:#c0392b}

@media (max-width:480px){
    .menu-screen h1{font-size:20px}
    .play-btn{font-size:18px;padding:12px 40px}
    .cell{font-size:16px}
    .currency-item{font-size:11px;padding:3px 8px}
    .nav-btn{font-size:9px}
    .nav-btn .nav-icon{font-size:16px}
}
</style>
</head>
<body>
<div class="container">
<!-- Верхняя панель -->
<div class="top-bar">
<div class="avatar">👤</div>
<div class="currencies">
<div class="currency-item">🪙 <span id="goldDisplay">0</span></div>
<div class="currency-item">🫙 <span id="bottleDisplay">0</span></div>
</div>
<div class="energy-bar-wrap">
<div class="energy-bar-fill" id="energyFill" style="width:0%"></div>
<div class="energy-text" id="energyText">0/1000</div>
</div>
<button style="background:transparent;border:none;font-size:18px;cursor:pointer;color:#fff;padding:4px">⚙️</button>
</div>

<!-- Основной контент -->
<div class="main-content" id="mainContent">
<!-- Меню -->
<div class="menu-screen" id="menuScreen">
<h1>🍎 Fruit Garden Match</h1>
<div class="subtitle">Три в ряд с экономикой!</div>
<div class="energy-section">
<div class="energy-label">⚡ Энергия: <span id="menuEnergyText">0/1000</span></div>
<div class="progress-wrap"><div class="progress-fill" id="menuEnergyFill" style="width:0%"></div></div>
</div>
<button class="play-btn" id="playBtn">🎮 ИГРАТЬ</button>
<div class="daily-offer" id="dailyOffer">
<h3>🎁 Ежедневное предложение</h3>
<p id="dailyOfferText">Загрузка...</p>
<button id="dailyOfferBtn">Забрать</button>
</div>
</div>
<!-- Игровой экран -->
<div class="game-screen" id="gameScreen">
<div class="game-header">
<div class="level-info">📊 Ур. <span id="levelDisplay">1</span> 🎯 <span id="targetDisplay">0</span>/<span id="totalTargetDisplay">5</span></div>
<div class="moves">👣 <span id="movesDisplay">35</span></div>
<button id="backToMenuBtn">✕</button>
</div>
<div class="abilities-bar">
<button id="useMoves5">➕5 (<span id="countMoves5">0</span>)</button>
<button id="useMoves10">➕10 (<span id="countMoves10">0</span>)</button>
<button id="useBomb">💥 (<span id="countBombs">0</span>)</button>
<button id="useShuffle">🔀 (<span id="countShuffles">0</span>)</button>
<button id="openShopInGame" class="shop-in-game">🛒</button>
</div>
<div class="board" id="board"></div>
</div>
</div>

<!-- Нижнее меню -->
<div class="bottom-nav">
<button class="nav-btn" id="navShop">🛒<span>Магазин</span></button>
<button class="nav-btn" id="navTournament">🏆<span>Турнир</span></button>
<button class="nav-btn active" id="navHome">🏠<span>Главная</span></button>
<button class="nav-btn" id="navQuests">📋<span>Задания</span></button>
<button class="nav-btn" id="navMetro">🚇<span>Метро</span></button>
</div>
</div>

<script>
(function() {
    const R = 8, C = 8;
    const S = ['🍎','🍊','🍇','🍉','🍓','🍋','🥝'];
    const V = '🏺', B = '💥';
    const MAX_MOVES = 35;
    
    // ЭКОНОМИКА (переменные для баланса)
    const GOLD_PER_LEVEL = 10;       // монет за уровень
    const BOTTLES_PER_LEVEL = 50;    // банок за уровень
    const ENERGY_PER_MOVE = 100;     // энергии за оставшийся ход
    const ENERGY_TIERS = [1000, 2000, 3000, 4000, 5000]; // пороги энергии
    const ENERGY_REWARDS = [100, 150, 200, 300, 500];     // награды за пороги
    const DAILY_COST = 15;           // стоимость ежедневного предложения в монетах

    let b = [];
    let gold = parseInt(localStorage.getItem('gold')) || 0;
    let cur = parseInt(localStorage.getItem('bottleCurrency')) || 0;
    let energy = parseInt(localStorage.getItem('energy')) || 0;
    let energyTier = parseInt(localStorage.getItem('energyTier')) || 0;
    let lv = parseInt(localStorage.getItem('currentLevel')) || 1;
    let isFruitLevel = true;
    let target = 45;
    let p = 0;
    let m = MAX_MOVES;
    let sr = -1, sc = -1;
    let proc = false;

    const ST = [
        { id: 'vdnh', name: 'ВДНХ', cost: 50, bonus: { moves: 1 } },
        { id: 'sokol', name: 'Сокол', cost: 150, bonus: { moves: 1 } },
        { id: 'park', name: 'Парк Культуры', cost: 300, bonus: { moves: 2 } },
        { id: 'kiev', name: 'Киевская', cost: 500, bonus: { bottles: 0.05 } },
        { id: 'arbat', name: 'Арбатская', cost: 800, bonus: { bottles: 0.1 } },
        { id: 'ring', name: 'Кольцевая', cost: 1200, bonus: { moves: 3 } }
    ];
    let owned = JSON.parse(localStorage.getItem('metroStations')) || [];
    let abilities = JSON.parse(localStorage.getItem('abilities')) || { moves5: 0, moves10: 0, bombs: 0, shuffles: 0 };
    
    // Ежедневное предложение
    let dailyData = JSON.parse(localStorage.getItem('dailyOffer')) || { date: '', type: '', claimed: false };

    function saveAbilities() { localStorage.setItem('abilities', JSON.stringify(abilities)); }
    function getBonusMoves() { let t=0; for(const id of owned){ const s=ST.find(st=>st.id===id); if(s&&s.bonus.moves)t+=s.bonus.moves; } return t; }
    function getBonusBottles() { let t=1; for(const id of owned){ const s=ST.find(st=>st.id===id); if(s&&s.bonus.bottles)t+=s.bonus.bottles; } return t; }
    function getStationCost(id) { const s=ST.find(st=>st.id===id); const cnt=owned.filter(st=>st===id).length; return Math.round(s.cost*(1+cnt*0.2)); }
    function getTarget() { const base=isFruitLevel?45:4; const growth=isFruitLevel?5:1; const max=isFruitLevel?120:15; return Math.min(base+lv*growth,max); }

    const be = document.getElementById('board');
    const ld = document.getElementById('levelDisplay');
    const td = document.getElementById('targetDisplay');
    const ttd = document.getElementById('totalTargetDisplay');
    const md = document.getElementById('movesDisplay');
    const goldD = document.getElementById('goldDisplay');
    const bottleD = document.getElementById('bottleDisplay');
    const energyFill = document.getElementById('energyFill');
    const energyText = document.getElementById('energyText');
    const menuEnergyFill = document.getElementById('menuEnergyFill');
    const menuEnergyText = document.getElementById('menuEnergyText');
    const ms = document.getElementById('menuScreen');
    const gs = document.getElementById('gameScreen');

    function updateEnergyUI() {
        const tier = energyTier < ENERGY_TIERS.length ? ENERGY_TIERS[energyTier] : ENERGY_TIERS[ENERGY_TIERS.length-1];
        const pct = Math.min(100, (energy / tier) * 100);
        if(energyFill) energyFill.style.width = pct + '%';
        if(energyText) energyText.textContent = energy + '/' + tier;
        if(menuEnergyFill) menuEnergyFill.style.width = pct + '%';
        if(menuEnergyText) menuEnergyText.textContent = energy + '/' + tier;
    }

    function addEnergy(amount) {
        energy += amount;
        let tier = energyTier < ENERGY_TIERS.length ? ENERGY_TIERS[energyTier] : ENERGY_TIERS[ENERGY_TIERS.length-1];
        while(energy >= tier) {
            energy -= tier;
            const reward = energyTier < ENERGY_REWARDS.length ? ENERGY_REWARDS[energyTier] : 500;
            cur += reward;
            if(energyTier < ENERGY_TIERS.length - 1) energyTier++;
            tier = energyTier < ENERGY_TIERS.length ? ENERGY_TIERS[energyTier] : ENERGY_TIERS[ENERGY_TIERS.length-1];
            alert('⚡ Энергия заполнена! Получено ' + reward + ' 🫙 банок!' + (energyTier >= ENERGY_TIERS.length-1 ? ' 🎁 Редкий буст!' : ''));
        }
        localStorage.setItem('energy', energy);
        localStorage.setItem('energyTier', energyTier);
        updateEnergyUI();
    }

    function generateDailyOffer() {
        const today = new Date().toDateString();
        if(dailyData.date !== today) {
            dailyData = { date: today, type: Math.random() < 0.5 ? 'bottles' : 'moves', claimed: false };
            localStorage.setItem('dailyOffer', JSON.stringify(dailyData));
        }
        const offerText = document.getElementById('dailyOfferText');
        const offerBtn = document.getElementById('dailyOfferBtn');
        if(offerText && offerBtn) {
            if(dailyData.claimed) {
                offerText.textContent = '✅ Уже забрано! Завтра новое предложение.';
                offerBtn.disabled = true;
                offerBtn.textContent = 'Забрано';
                offerBtn.classList.add('claimed');
            } else {
                if(dailyData.type === 'bottles') {
                    offerText.textContent = 'Получи 100 🫙 за ' + DAILY_COST + ' 🪙';
                } else {
                    offerText.textContent = 'Получи +10 ходов за ' + DAILY_COST + ' 🪙';
                }
                offerBtn.disabled = gold < DAILY_COST;
                offerBtn.textContent = gold < DAILY_COST ? 'Не хватает монет' : 'Забрать';
            }
        }
    }

    function claimDailyOffer() {
        if(dailyData.claimed) return;
        if(gold < DAILY_COST) { alert('❌ Не хватает монет!'); return; }
        gold -= DAILY_COST;
        dailyData.claimed = true;
        if(dailyData.type === 'bottles') {
            cur += 100;
            alert('✅ Получено 100 🫙 банок!');
        } else {
            abilities.moves10++;
            saveAbilities();
            alert('✅ Получено +10 ходов (способность)!');
        }
        localStorage.setItem('dailyOffer', JSON.stringify(dailyData));
        localStorage.setItem('gold', gold);
        u();
        generateDailyOffer();
    }

    function u() {
        localStorage.setItem('bottleCurrency', cur);
        localStorage.setItem('gold', gold);
        localStorage.setItem('currentLevel', lv);
        if(goldD) goldD.textContent = gold;
        if(bottleD) bottleD.textContent = cur;
        if(ld) ld.textContent = lv;
        if(td) td.textContent = p;
        if(ttd) ttd.textContent = target;
        if(md) md.textContent = m;
        updateEnergyUI();
        const cm5=document.getElementById('countMoves5'), cm10=document.getElementById('countMoves10');
        const cb=document.getElementById('countBombs'), cs=document.getElementById('countShuffles');
        if(cm5) cm5.textContent = abilities.moves5 || 0;
        if(cm10) cm10.textContent = abilities.moves10 || 0;
        if(cb) cb.textContent = abilities.bombs || 0;
        if(cs) cs.textContent = abilities.shuffles || 0;
    }

    function createBoard() {
        isFruitLevel = lv % 2 === 1;
        target = getTarget();
        const nb = [];
        for(let r=0; r<R; r++) {
            const row = [];
            for(let c=0; c<C; c++) {
                if(!isFruitLevel && Math.random()<0.15 && r>0 && r<R-1 && c>0 && c<C-1) {
                    row.push(V);
                } else {
                    let sym, a=0;
                    do { sym=S[Math.floor(Math.random()*S.length)]; a++; if(a>50) break; }
                    while((r>=2 && nb[r-1][c]===sym && nb[r-2][c]===sym) || (c>=2 && row[c-1]===sym && row[c-2]===sym));
                    row.push(sym);
                }
            }
            nb.push(row);
        }
        return nb;
    }

    function findMatches(d) {
        const m=new Set(), g=[];
        for(let r=0; r<R; r++) { let c=0; while(c<C) { const sym=d[r][c]; if(sym===null||sym===B||sym===V){c++;continue;} let len=1; while(c+len<C && d[r][c+len]===sym)len++; if(len>=3){ const cells=[]; for(let i=0;i<len;i++)cells.push(r+','+(c+i)); g.push({symbol:sym,cells,length:len}); for(const k of cells)m.add(k); } c+=len; } }
        for(let c=0; c<C; c++) { let r=0; while(r<R) { const sym=d[r][c]; if(sym===null||sym===B||sym===V){r++;continue;} let len=1; while(r+len<R && d[r+len][c]===sym)len++; if(len>=3){ const cells=[]; for(let i=0;i<len;i++)cells.push((r+i)+','+c); g.push({symbol:sym,cells,length:len}); for(const k of cells)m.add(k); } r+=len; } }
        return {matches:m, groups:g};
    }

    function ab(row,col) { const d=new Set(); for(let c=0;c<C;c++){ if(b[row][c]!==null&&b[row][c]!==B)
            async function pmb(add) {
        while(true) {
            const { matches, groups } = findMatches(b);
            let beff = new Set(), bc = new Set();
            for(const g of groups) { if(g.length>=4) { const mid=Math.floor(g.cells.length/2); const[mr,mc]=g.cells[mid].split(',').map(Number); b[mr][mc]=B; bc.add(mr+','+mc); } }
            for(let r=0; r<R; r++) { for(let c=0; c<C; c++) { if(b[r][c]===B) { const e=ab(r,c); for(const k of e) beff.add(k); } } }
            const all = new Set([...matches, ...beff]);
            if(all.size===0 && bc.size===0) break;
            let cnt=0;
            if(add && matches.size>0) { for(const key of matches) { const[r,c]=key.split(',').map(Number); const neighbors=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]]; for(const[nr,nc] of neighbors) { if(nr>=0&&nr<R&&nc>=0&&nc<C) { if(isFruitLevel&&b[nr][nc]!==null&&b[nr][nc]!==B&&b[nr][nc]!==V){cnt++;b[nr][nc]=null;} else if(!isFruitLevel&&b[nr][nc]===V){cnt++;b[nr][nc]=null;} } } } p+=cnt; }
            rb(false, matches, beff, bc);
            await slp(500);
            for(const k of all) { const[r,c]=k.split(',').map(Number); b[r][c]=null; }
            for(let c=0; c<C; c++) { let wr=R-1; for(let r=R-1; r>=0; r--) { if(b[r][c]!==null) { b[wr][c]=b[r][c]; if(wr!==r)b[r][c]=null; wr--; } } for(let r=wr; r>=0; r--) { if(!isFruitLevel&&Math.random()<0.15&&r>0&&r<R-1&&c>0&&c<C-1) b[r][c]=V; else b[r][c]=S[Math.floor(Math.random()*S.length)]; } }
            if(add) m--;
            u();
            rb(true);
            await slp(400);
        }
        if(p >= target) { await lc(); return; }
        if(m <= 0) { await go(); return; }
    }

    async function lc() {
        proc = true;
        // Награды за уровень
        gold += GOLD_PER_LEVEL;
        cur += Math.round(BOTTLES_PER_LEVEL * getBonusBottles());
        // Конвертация оставшихся ходов в энергию
        if(m > 0) { addEnergy(m * ENERGY_PER_MOVE); }
        u();
        const modal = document.createElement('div');
        modal.innerHTML = '<div class="metro-content" style="text-align:center"><h2>🎉 Уровень пройден!</h2><p>🪙 +' + GOLD_PER_LEVEL + ' | 🫙 +' + Math.round(BOTTLES_PER_LEVEL * getBonusBottles()) + '</p><p>⚡ +' + (m * ENERGY_PER_MOVE) + ' энергии</p><button id="nextLevelBtn" style="background:#f9ca24;color:#1a1a2e;border:none;padding:12px 30px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px">➡️ Следующий уровень</button></div>';
        modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;';
        document.body.appendChild(modal);
        await new Promise(r => { const btn=document.getElementById('nextLevelBtn'); if(btn) btn.addEventListener('click',()=>{modal.remove();r();}); else r(); });
        lv++; p=0; m=MAX_MOVES+getBonusMoves(); b=createBoard();
        let mf=findMatches(b).matches; while(mf.size>0){ for(const k of mf){ const[r,c]=k.split(',').map(Number); b[r][c]=S[Math.floor(Math.random()*S.length)]; } mf=findMatches(b).matches; }
        if(!hvm()) shuffle();
        sr=-1; sc=-1; rb(false); u(); proc=false;
    }

    async function go() {
        proc=true;
        const modal=document.createElement('div');
        modal.innerHTML='<div class="metro-content" style="text-align:center"><h2 style="color:#e74c3c;">💀 Ходы закончились!</h2><p>Попробуйте снова.</p><button id="retryBtn" style="background:#e74c3c;color:#fff;border:none;padding:12px 30px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px">🔄 Попробовать снова</button></div>';
        modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;';
        document.body.appendChild(modal);
        await new Promise(r=>{const btn=document.getElementById('retryBtn');if(btn)btn.addEventListener('click',()=>{modal.remove();r();});else r();});
        lv=Math.max(1,lv-1); p=0; m=MAX_MOVES+getBonusMoves(); b=createBoard();
        let mf=findMatches(b).matches; while(mf.size>0){for(const k of mf){const[r,c]=k.split(',').map(Number);b[r][c]=S[Math.floor(Math.random()*S.length)];}mf=findMatches(b).matches;}
        if(!hvm())shuffle(); sr=-1;sc=-1;rb(false);u();proc=false;
    }

    function hvm(){for(let r=0;r<R;r++){for(let c=0;c<C;c++){const v=b[r][c];if(v===null||v===B||v===V)continue;if(c<C-1&&b[r][c+1]!==B&&b[r][c+1]!==V){[b[r][c],b[r][c+1]]=[b[r][c+1],b[r][c]];if(findMatches(b).matches.size>0){[b[r][c],b[r][c+1]]=[b[r][c+1],b[r][c]];return true;}[b[r][c],b[r][c+1]]=[b[r][c+1],b[r][c]];}if(r<R-1&&b[r+1][c]!==B&&b[r+1][c]!==V){[b[r][c],b[r+1][c]]=[b[r+1][c],b[r][c]];if(findMatches(b).matches.size>0){[b[r][c],b[r+1][c]]=[b[r+1][c],b[r][c]];return true;}[b[r][c],b[r+1][c]]=[b[r+1][c],b[r][c]];}}}return false;}

    function shuffle(){while(!hvm()){for(let r=0;r<R;r++){for(let c=0;c<C;c++){if(!isFruitLevel&&Math.random()<0.15&&r>0&&r<R-1&&c>0&&c<C-1)b[r][c]=V;else b[r][c]=S[Math.floor(Math.random()*S.length)];}}let mf=findMatches(b).matches;while(mf.size>0){for(const k of mf){const[r,c]=k.split(',').map(Number);b[r][c]=S[Math.floor(Math.random()*S.length)];}mf=findMatches(b).matches;}}rb(false);}

    function onClick(e){if(proc)return;const r=parseInt(e.currentTarget.dataset.row),c=parseInt(e.currentTarget.dataset.col);const v=b[r][c];if(v===null||v===V)return;if(v===B){b[r][c]=null;const ex=ab(r,c);for(const k of ex){const[rr,cc]=k.split(',').map(Number);b[rr][cc]=null;}rb(false,new Set(),ex);setTimeout(()=>{for(let cc=0;cc<C;cc++){let wr=R-1;for(let rr=R-1;rr>=0;rr--){if(b[rr][cc]!==null){b[wr][cc]=b[rr][cc];if(wr!==rr)b[rr][cc]=null;wr--;}}for(let rr=wr;rr>=0;rr--){if(!isFruitLevel&&Math.random()<0.15&&rr>0&&rr<R-1&&cc>0&&cc<C-1)b[rr][cc]=V;else b[rr][cc]=S[Math.floor(Math.random()*S.length)];}}rb(true);if(!hvm())shuffle();},500);return;}if(sr===-1){sr=r;sc=c;rb(false);return;}if(sr===r&&sc===c){sr=-1;sc=-1;rb(false);return;}const dr=Math.abs(r-sr),dc=Math.abs(c-sc);if((dr===1&&dc===0)||(dr===0&&dc===1))trySwap(sr,sc,r,c);else{sr=r;sc=c;rb(false);}}

    async function trySwap(r1,c1,r2,c2){proc=true;m--;u();[b[r1][c1],b[r2][c2]]=[b[r2][c2],b[r1][c1]];const{matches}=findMatches(b);let hb=false;for(let r=0;r<R;r++){for(let c=0;c<C;c++){if(b[r][c]===B)hb=true;}}if(matches.size>0||hb){sr=-1;sc=-1;await pmb(true);rb(false);}else{[b[r1][c1],b[r2][c2]]=[b[r2][c2],b[r1][c1]];sr=-1;sc=-1;rb(false);}proc=false;}

    function showShop(){let html='<div class="metro-content"><h2>🛒 Магазин</h2>';html+='<p style="text-align:center;margin-bottom:15px;">🪙 '+gold+' | 🫙 '+cur+'</p>';html+='<p style="text-align:center;margin-bottom:15px;color:#a855f7;">Способности сохраняются!</p>';const shopItems=[{id:'moves5',name:'➕ 5 ходов',cost:30,desc:'В наличии: '+(abilities.moves5||0)+' шт.',ability:'moves5'},{id:'moves10',name:'➕ 10 ходов',cost:50,desc:'В наличии: '+(abilities.moves10||0)+' шт.',ability:'moves10'},{id:'bombs',name:'💥 Бомба',cost:40,desc:'В наличии: '+(abilities.bombs||0)+' шт.',ability:'bombs'},{id:'shuffles',name:'🔀 Перемешать',cost:20,desc:'В наличии: '+(abilities.shuffles||0)+' шт.',ability:'shuffles'}];for(const item of shopItems){html+='<div class="station"><div class="header"><span>'+item.name+'</span><span>'+item.cost+' 🫙</span></div><div class="bonus">'+item.desc+'</div><button data-item="'+item.id+'" class="buy-item-btn">Купить</button></div>';}html+='<button class="close-btn" id="closeShopBtn">✕ Закрыть</button></div>';const modal=document.createElement('div');modal.className='metro-modal';modal.innerHTML=html;document.body.appendChild(modal);modal.querySelectorAll('.buy-item-btn').forEach(btn=>{btn.addEventListener('click',function(){const itemId=this.dataset.item;const item=shopItems.find(i=>i.id===itemId);if(item){if(cur<item.cost){alert('❌ Не хватает банок! Нужно '+item.cost+' 🫙');return;}cur-=item.cost;abilities[item.ability]++;saveAbilities();u();modal.remove();showShop();}});});const closeBtn=modal.querySelector('#closeShopBtn');if(closeBtn)closeBtn.addEventListener('click',()=>modal.remove());}

    function showMetro(){let html='<div class="metro-content"><h2>🚇 Метро 2033</h2>';for(const s of ST){const cost=getStationCost(s.id);const ownedCount=owned.filter(st=>st===s.id).length;let bonusText='';if(s.bonus.moves)bonusText+='➕'+s.bonus.moves+' ходов ';if(s.bonus.bottles)bonusText+='🍾+'+Math.round(s.bonus.bottles*100)+'% банок';html+='<div class="station"><div class="header"><span>'+s.name+' ('+ownedCount+' шт.)</span><span>'+cost+' 🫙</span></div><div class="bonus">'+bonusText+'</div>';if(ownedCount===0){html+='<button data-station="'+s.id+'" class="buy-station-btn">Купить</button>';}else{html+='<button disabled>✔ Куплено</button>';}html+='</div>';}html+='<button class="close-btn" id="closeMetroBtn">✕ Закрыть</button></div>';const modal=document.createElement('div');modal.className='metro-modal';modal.innerHTML=html;document.body.appendChild(modal);modal.querySelectorAll('.buy-station-btn').forEach(btn=>{btn.addEventListener('click',function(){buyStation(this.dataset.station);});});const closeBtn=modal.querySelector('#closeMetroBtn');if(closeBtn)closeBtn.addEventListener('click',()=>modal.remove());}

    function buyStation(id){if(proc)return;const cost=getStationCost(id);if(cur<cost){alert('Не хватает 🫙 банок!');return;}cur-=cost;owned.push(id);localStorage.setItem('metroStations',JSON.stringify(owned));u();alert('🚇 Станция '+ST.find(s=>s.id===id).name+' восстановлена!');const em=document.querySelector('.metro-modal');if(em)em.remove();showMetro();}

    function showMenu(){if(ms)ms.style.display='flex';if(gs)gs.style.display='none';u();generateDailyOffer();}
    function showGame(){if(ms)ms.style.display='none';if(gs)gs.style.display='flex';lv=parseInt(localStorage.getItem('currentLevel'))||1;target=getTarget();p=0;m=MAX_MOVES+getBonusMoves();b=createBoard();let mf=findMatches(b).matches;while(mf.size>0){for(const k of mf){const[r,c]=k.split(',').map(Number);b[r][c]=S[Math.floor(Math.random()*S.length)];}mf=findMatches(b).matches;}if(!hvm())shuffle();sr=-1;sc=-1;rb(false);u();}

    // Привязка кнопок
    document.getElementById('playBtn').addEventListener('click', showGame);
    document.getElementById('backToMenuBtn').addEventListener('click', showMenu);
    document.getElementById('dailyOfferBtn').addEventListener('click', claimDailyOffer);
    
    // Нижнее меню
    document.getElementById('navShop').addEventListener('click', showShop);
    document.getElementById('navHome').addEventListener('click', showMenu);
    document.getElementById('navMetro').addEventListener('click', showMetro);
    document.getElementById('navTournament').addEventListener('click', ()=>alert('🏆 Турниры скоро появятся!'));
    document.getElementById('navQuests').addEventListener('click', ()=>alert('📋 Задания скоро появятся!'));
    
    document.getElementById('useMoves5').addEventListener('click',()=>{if(abilities.moves5>0){abilities.moves5--;m+=5;saveAbilities();u();alert('✅ +5 ходов!');}else alert('❌ Нет способностей!');});
    document.getElementById('useMoves10').addEventListener('click',()=>{if(abilities.moves10>0){abilities.moves10--;m+=10;saveAbilities();u();alert('✅ +10 ходов!');}else alert('❌ Нет способностей!');});
    document.getElementById('useBomb').addEventListener('click',()=>{if(abilities.bombs>0){abilities.bombs--;saveAbilities();u();alert('💥 Выбери клетку для взрыва!');proc=true;const bh=function(e){const r=parseInt(e.currentTarget.dataset.row),c=parseInt(e.currentTarget.dataset.col);for(let dr=-1;dr<=1;dr++){for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<R&&nc>=0&&nc<C)b[nr][nc]=null;}}for(let cc=0;cc<C;cc++){let wr=R-1;for(let rr=R-1;rr>=0;rr--){if(b[rr][cc]!==null){b[wr][cc]=b[rr][cc];if(wr!==rr)b[rr][cc]=null;wr--;}}for(let rr=wr;rr>=0;rr--)b[rr][cc]=S[Math.floor(Math.random()*S.length)];}rb(true);proc=false;be.querySelectorAll('.cell').forEach(cell=>cell.removeEventListener('click',bh));};be.querySelectorAll('.cell').forEach(cell=>cell.addEventListener('click',bh,{once:true}));}else alert('❌ Нет бомб!');});
    document.getElementById('useShuffle').addEventListener('click',()=>{if(abilities.shuffles>0){abilities.shuffles--;saveAbilities();shuffle();u();alert('🔀 Доска перемешана!');}else alert('❌ Нет перемешиваний!');});
    document.getElementById('openShopInGame').addEventListener('click', showShop);

    showMenu();
    u();
    generateDailyOffer();
})();
